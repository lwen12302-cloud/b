        code: "# -*- coding: utf-8 -*-\nimport json\nimport requests\n\n# 🚨 适配你刚才\
          启动的 FastAPI 爬虫服务\ndef main(input):\n    \"\"\"\n    这里 input 对应了你工作流节点里定\
          义的那个输入的变量名\n    \"\"\"\n    # 🚨 核心配置：请确保此 IP 和 端口 (8001) 能够被你的运行环境访问到\n\
          \    # 如果是在同一台机器上运行，建议改为 \"http://127.0.0.1:8001/api/bili/query\"\n    TARGET_PROXY_URL\
          \ = \"http://10.193.97.179:8001/api/bili/query\"\n    \n    # 获取 UID 的逻辑\
          \n    uid = \"\"\n    try:\n        # 这个 input 是平台通过 kwargs 传进来的参数\n   \
          \     if isinstance(input, dict):\n            # 兼容 input 变量名或直接从字典中取 input/mid\
          \ 键\n            uid = input.get(\"input\", \"\") or input.get(\"mid\",\
          \ \"\")\n        else:\n            uid = str(input).strip()\n    except:\n\
          \        uid = str(input)\n\n    # 发起请求\n    # 注意：服务端接收的参数名是 'mid'\n   \
          \ params = {\n        \"mid\": uid\n    }\n\n    try:\n        # 设置超时为 120\
          \ 秒，因为抓取大量投稿视频需要翻页，比较耗时\n        response = requests.get(TARGET_PROXY_URL,\
          \ params=params, timeout=120)\n        \n        # 检查响应状态\n        if response.status_code\
          \ == 200:\n            data = response.json()\n            ret = {\n   \
          \             \"message\": f\"成功读取 UID: {uid}\\n数据已抓取，总计 {data.get('total',\
          \ 0)} 个视频。\",\n                \"status\": \"success\",\n              \
          \  \"data\": data # 返回完整的 JSON 结构供后续节点解析\n            }\n        else:\n\
          \            ret = {\n                \"message\": f\"服务返回错误 (HTTP {response.status_code}):\
          \ {response.text}\",\n                \"status\": \"error\"\n          \
          \  }\n            \n    except Exception as e:\n        ret = {\n      \
          \      \"message\": f\"无法连接爬虫服务: {str(e)}\",\n            \"status\": \"\
          error\"\n        }\n    return ret\n\n# --- 本地测试代码 (生产环境下请注释掉) ---\nif __name__\
